services:
  mission-control-proxy:
    image: nginx:alpine
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.mission.rule=Host(`mission.zumaintelligence.com`)
      - traefik.http.routers.mission.tls=true
      - traefik.http.routers.mission.entrypoints=web,websecure
      - traefik.http.routers.mission.tls.certresolver=mytlschallenge
      - traefik.http.services.mission.loadbalancer.server.port=80
    volumes:
      - /docker/mission-control/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true

  nexus-legal-proxy:
    image: nginx:alpine
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.nexus-legal.rule=Host(`legal.zumaintelligence.com`)
      - traefik.http.routers.nexus-legal.tls=true
      - traefik.http.routers.nexus-legal.entrypoints=web,websecure
      - traefik.http.routers.nexus-legal.tls.certresolver=mytlschallenge
      - traefik.http.services.nexus-legal.loadbalancer.server.port=80
    volumes:
      - /root/projects/mission-control/nginx-legal.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - n8n_default
